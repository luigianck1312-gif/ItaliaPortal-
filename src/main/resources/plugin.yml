name: SpawnPortals
version: 1.0.0
main: dev.spawnportals.SpawnPortals
api-version: '1.21'
description: Portali allo spawn per Overworld, Nether ed End con teletrasporto casuale
authors: [SpawnPortals]

commands:
  portale:
    description: Gestisci i portali spawn
    usage: |
      /portale wand
      /portale place <overworld|nether|end>
      /portale remove <overworld|nether|end>
      /portale list
    permission: spawnportals.admin

permissions:
  spawnportals.admin:
    description: Permesso per gestire i portali
    default: op
  spawnportals.use:
    description: Permesso per usare i portali
    default: true
