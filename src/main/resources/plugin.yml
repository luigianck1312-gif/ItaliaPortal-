name: SpawnPortals
version: 1.0.0
main: dev.spawnportals.SpawnPortals
api-version: '1.21'
description: Villager portali con ologramma
authors: [SpawnPortals]
commands:
  portale:
    description: Gestisci i villager portale
    usage: /portale <spawn|remove|list> [overworld|nether|end]
    permission: spawnportals.admin
permissions:
  spawnportals.admin:
    description: Gestione portali
    default: op
  spawnportals.use:
    description: Usa i portali
    default: true
